spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/online_university
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

logging:
  level:
    uz.university: DEBUG
    org.springframework.security: DEBUG

jwt:
  secret: dev-secret-key-that-is-at-least-256-bits-long-for-hs256-algorithm-do-not-use-in-prod
  expiration: 86400000
  refresh-expiration: 604800000

file:
  upload-dir: ./uploads
